name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Build packages
        run: npm run build

      - name: Run unit tests (vitest)
        run: npm test

      - name: Run e2e tests (Playwright + axe)
        run: npm run test:e2e

      - name: Upload Playwright report (artifact backup)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Publish Playwright report to Pages
        if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          rm -rf docs/playwright-report
          mkdir -p docs
          cp -r playwright-report docs/playwright-report
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/playwright-report
          if git diff --staged --quiet; then
            echo "No changes to playwright report"
          else
            git commit -m "chore: update playwright report [skip ci]"
            git push
          fi
